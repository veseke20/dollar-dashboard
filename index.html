<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>داشبورد دلار</title>

<style>
body{
    background:#101010;
    color:white;
    font-family:tahoma;
    text-align:center;
    padding:30px;
}

.card{
    background:#222;
    border-radius:20px;
    padding:25px;
    max-width:450px;
    margin:auto;
}

.price{
    font-size:42px;
    color:#00ff88;
    margin:25px;
}

button{
    background:#00ff88;
    border:0;
    padding:12px 25px;
    border-radius:10px;
    font-size:16px;
}

.info{
    color:#aaa;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="card">

<h2>💵 نرخ دلار</h2>

<div id="price" class="price">
در حال دریافت...
</div>

<button onclick="updateDollar()">
🔄 بروزرسانی
</button>

<div id="info" class="info"></div>

</div>


<script>
async function updateDollar(){

document.getElementById("info").innerHTML="در حال دریافت قیمت..."

try{

let response = await fetch(
"https://api.allorigins.win/raw?url=https://www.tgju.org/"
);

let text = await response.text();

let match = text.match(/دلار.*?(\d{2,3},\d{3})/);

if(match){
document.getElementById("price").innerHTML =
match[1] + " تومان";
}
else{
document.getElementById("price").innerHTML =
"قیمت پیدا نشد";
}

document.getElementById("info").innerHTML =
"آخرین بروزرسانی: "+
new Date().toLocaleTimeString("fa-IR");

}
catch(e){

document.getElementById("price").innerHTML =
"خطا در دریافت";

document.getElementById("info").innerHTML =
"منبع پاسخ نداد";

}

}

updateDollar();

setInterval(updateDollar,600000);
</script>

</body>
</html>
