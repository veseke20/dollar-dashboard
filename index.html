<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>داشبورد دلار</title>

<style>
body{
    background:#101010;
    color:white;
    font-family:tahoma;
    text-align:center;
    padding:30px;
}

.card{
    background:#222;
    border-radius:20px;
    padding:25px;
    max-width:450px;
    margin:auto;
}

.price{
    font-size:42px;
    color:#00ff88;
    margin:25px;
}

button{
    background:#00ff88;
    border:0;
    padding:12px 25px;
    border-radius:10px;
    font-size:16px;
}

.info{
    color:#aaa;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="card">

<h2>💵 نرخ دلار</h2>

<div id="price" class="price">
در حال دریافت...
</div>

<button onclick="updateDollar()">
🔄 بروزرسانی
</button>

<div id="info" class="info"></div>

</div>


<script> 
    
async function updateDollar(){

document.getElementById("info").innerHTML="در حال دریافت..."

try{

let r = await fetch(
"https://api.allorigins.win/get?url=https://www.tgju.org/"
);

let data = await r.json();

if(data.contents){

document.getElementById("price").innerHTML =
"داده دریافت شد";

document.getElementById("info").innerHTML =
"اتصال به منبع برقرار است";

}else{

throw "empty";

}

}

catch(e){

document.getElementById("price").innerHTML =
"خطا";

document.getElementById("info").innerHTML =
"اتصال برقرار نشد";

}

}
    </script>

</body>
</html>
